<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BU MotoSpace - ลงทะเบียนฐานทัพชาวไบค์เกอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .bu-gradient { background: linear-gradient(135deg, #7c3aed 0%, #f97316 100%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        select option { background-color: #0f172a; color: white; }

        .tab-active { 
            background-color: #f97316 !important; 
            border-color: #f97316 !important; 
            color: #ffffff !important; 
            font-weight: 600;
            box-shadow: 0 4px 14px 0 rgba(249, 115, 22, 0.39);
        }
        .tab-inactive { 
            background-color: #1e293b; 
            border-color: #334155; 
            color: #94a3b8; 
        }

        .bike-preview-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #f97316;
            box-shadow: 0 0 25px rgba(249, 115, 22, 0.5);
            object-fit: cover;
            background-color: #1e293b;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bu-gradient opacity-20 blur-3xl rounded-full"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 opacity-10 blur-3xl rounded-full"></div>
        
        <!-- Header -->
        <div id="headerSection" class="text-center mb-6">
            <h1 class="text-4xl font-bold mb-2 tracking-tight">BU <span class="text-purple-500">Moto</span><span class="text-orange-500">Space</span></h1>
            <p class="text-slate-400 text-sm font-light">ระบบลงทะเบียนรถจักรยานยนต์มหาวิทยาลัยกรุงเทพ</p>
        </div>

        <!-- Tab Selection -->
        <div id="tabContainer" class="flex gap-2 mb-6 p-1 bg-slate-900 rounded-2xl border border-slate-800">
            <button onclick="switchTab('student')" id="btnStudent" class="flex-1 py-2.5 px-4 rounded-xl border text-sm transition-all tab-active">
                นักศึกษา
            </button>
            <button onclick="switchTab('staff')" id="btnStaff" class="flex-1 py-2.5 px-4 rounded-xl border text-sm transition-all tab-inactive">
                บุคลากร
            </button>
        </div>

        <!-- Registration Form -->
        <form id="regForm" onsubmit="return false;" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">ชื่อ</label>
                    <input type="text" id="firstName" placeholder="ภาษาไทย" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">นามสกุล</label>
                    <input type="text" id="lastName" placeholder="ภาษาไทย" 
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white placeholder:text-slate-600">
                </div>
            </div>

            <div id="fieldStudentId">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">รหัสนักศึกษา</label>
                <input type="text" id="studentId" placeholder="1-xxxx-xxxx-x" maxlength="13"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white font-mono placeholder:text-slate-600 tracking-widest">
            </div>

            <div id="fieldStaffId" class="hidden">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">รหัสบุคลากร</label>
                <input type="text" id="staffId" placeholder="xxxxx" maxlength="5"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white font-mono placeholder:text-slate-600 tracking-[0.5em]">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">เบอร์โทรศัพท์</label>
                <input type="tel" id="phoneNumber" placeholder="0xx-xxx-xxxx" maxlength="12"
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white font-mono placeholder:text-slate-600 tracking-widest">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">ทะเบียนรถ</label>
                    <div class="flex gap-2">
                        <input type="text" id="platePrefix" placeholder="1กข" maxlength="3"
                            class="w-1/3 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 text-center uppercase font-bold">
                        <input type="text" id="plateNumber" placeholder="1234" maxlength="4"
                            class="w-2/3 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 font-bold tracking-widest">
                    </div>
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 ml-1">จังหวัด</label>
                    <div class="relative">
                        <select id="plateProvince" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 transition-all text-white appearance-none cursor-pointer">
                            <option value="" disabled selected>เลือกจังหวัด</option>
                            <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                            <option value="ปทุมธานี">ปทุมธานี</option>
                            <option value="นนทบุรี">นนทบุรี</option>
                            <option value="สมุทรปราการ">สมุทรปราการ</option>
                            <option value="พระนครศรีอยุธยา">พระนครศรีอยุธยา</option>
                            <option value="ชลบุรี">ชลบุรี</option>
                            <option value="อื่นๆ">จังหวัดอื่นๆ</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">▼</div>
                    </div>
                </div>
            </div>

            <!-- Upload Photo -->
            <div onclick="document.getElementById('fileInput').click()" 
                 class="p-4 border-2 border-dashed border-slate-700 rounded-2xl text-center hover:border-orange-500 cursor-pointer transition-all group relative">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <div id="uploadPlaceholder">
                    <div class="text-slate-500 group-hover:text-orange-400 mb-1 text-2xl transition-transform group-hover:scale-110">🏍️</div>
                    <p class="text-[10px] text-slate-400 font-medium">อัปโหลดรูปภาพรถ</p>
                </div>
                <div id="filePreview" class="hidden text-xs text-green-400 font-semibold flex flex-col items-center gap-2">
                    <div class="text-xl">✨</div>
                    <span id="fileNameDisplay">รูปถ่ายพร้อมแล้ว</span>
                </div>
            </div>

            <button id="submitBtn" class="w-full bu-gradient py-4 rounded-xl font-bold text-lg hover:brightness-110 active:scale-95 transition-all shadow-lg flex justify-center items-center gap-3">
                <span>ยืนยันการลงทะเบียน</span>
            </button>
            
            <p id="errorMsg" class="text-red-400 text-[10px] text-center hidden font-medium"></p>
        </form>

        <!-- Success Message (Hidden by default) -->
        <div id="successMessage" class="hidden text-center py-2 space-y-6">
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center text-3xl mb-4 border border-green-500/30 animate-pulse">✓</div>
                <h2 class="text-2xl font-bold text-white leading-tight">ลงทะเบียนเรียบร้อยแล้ว!</h2>
                <p class="text-orange-400 text-sm mt-1">ข้อมูลของคุณถูกบันทึกเข้าสู่ระบบ Bu MOTOSPACE แล้ว</p>
            </div>

            <div class="flex justify-center my-6">
                <img id="displayBikeImg" src="" alt="Motorcycle" class="bike-preview-circle">
            </div>

            <div class="bg-slate-900/80 border border-slate-700 rounded-2xl p-5 text-left space-y-3">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <span class="text-slate-500 text-xs">เจ้าของรถ</span>
                    <span id="displayName" class="text-white font-semibold"></span>
                </div>
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <span class="text-slate-500 text-xs">เบอร์โทรศัพท์</span>
                    <span id="displayPhone" class="text-white font-mono"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-500 text-xs">หมายเลขทะเบียน</span>
                    <div class="text-right">
                        <div id="displayPlate" class="text-orange-500 font-bold text-lg leading-none uppercase"></div>
                        <div id="displayProvince" class="text-slate-400 text-[10px] mt-1"></div>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button onclick="location.reload()" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-sm font-medium transition-colors border border-slate-700">ลงทะเบียนคันอื่นเพิ่มเติม</button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <div class="text-[10px] text-slate-500 font-medium tracking-wide">
                Copyright By Student Safety and Conduct Department
            </div>
        </div>
    </div>

    <script>
        // เปลี่ยนมาใช้ Google Apps Script API แทน Firebase
        // ** นำ URL ที่ได้จากการ Deploy Apps Script มาใส่ตรงนี้ **
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYCRtiWdE6cUIYMdBh1kUAS8aXyIFGeUJe2MEsxbgpqnSILKYqy080o5QwgkDO0rbyMg/exec"; 

        let activeTab = 'student';
        let bikeImageData = null;

        window.switchTab = function(tab) {
            activeTab = tab;
            const btnS = document.getElementById('btnStudent');
            const btnP = document.getElementById('btnStaff');
            const fieldS = document.getElementById('fieldStudentId');
            const fieldP = document.getElementById('fieldStaffId');

            if (tab === 'student') {
                btnS.classList.replace('tab-inactive', 'tab-active');
                btnP.classList.replace('tab-active', 'tab-inactive');
                fieldS.classList.remove('hidden');
                fieldP.classList.add('hidden');
            } else {
                btnP.classList.replace('tab-inactive', 'tab-active');
                btnS.classList.replace('tab-active', 'tab-inactive');
                fieldP.classList.remove('hidden');
                fieldS.classList.add('hidden');
            }
        };

        document.getElementById('studentId').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            let f = '';
            if (v.length > 0) f += v[0];
            if (v.length > 1) f += '-' + v.substring(1, 5);
            if (v.length > 5) f += '-' + v.substring(5, 9);
            if (v.length > 9) f += '-' + v[9];
            e.target.value = f;
        });

        document.getElementById('phoneNumber').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            let f = '';
            if (v.length > 0) f += v.substring(0, 3);
            if (v.length > 3) f += '-' + v.substring(3, 6);
            if (v.length > 6) f += '-' + v.substring(6, 10);
            e.target.value = f;
        });

        document.getElementById('fileInput').addEventListener('change', function() {
            if (this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    bikeImageData = e.target.result;
                    document.getElementById('displayBikeImg').src = bikeImageData;
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                    document.getElementById('filePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

        function showError(m) {
            const e = document.getElementById('errorMsg');
            e.innerText = m; e.classList.remove('hidden');
            setTimeout(() => e.classList.add('hidden'), 3000);
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const formData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                phone: document.getElementById('phoneNumber').value.trim(),
                prefix: document.getElementById('platePrefix').value.trim(),
                number: document.getElementById('plateNumber').value.trim(),
                province: document.getElementById('plateProvince').value
            };

            const idValue = activeTab === 'student' ? 
                document.getElementById('studentId').value.trim() : 
                document.getElementById('staffId').value.trim();

            if (Object.values(formData).some(v => !v) || !idValue || !bikeImageData) {
                return showError("กรุณากรอกข้อมูลและอัปโหลดรูปภาพให้ครบถ้วน");
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="loader"></span> <span>กำลังส่งข้อมูล...</span>`;

            try {
                const finalData = {
                    ...formData,
                    personalId: idValue,
                    type: activeTab,
                    licensePlate: `${formData.prefix} ${formData.number}`,
                    imageBase64: bikeImageData
                };

                // ส่งข้อมูลไปยัง Google Apps Script
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(finalData)
                });
                
                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('displayName').innerText = `${finalData.firstName} ${finalData.lastName}`;
                    document.getElementById('displayPhone').innerText = finalData.phone;
                    document.getElementById('displayPlate').innerText = finalData.licensePlate;
                    document.getElementById('displayProvince').innerText = finalData.province;

                    document.getElementById('regForm').classList.add('hidden');
                    document.getElementById('tabContainer').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    throw new Error(result.message || "บันทึกไม่สำเร็จ");
                }

            } catch (e) {
                console.error(e);
                showError("เกิดข้อผิดพลาดในการส่งข้อมูลไปยัง Google Sheet");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `ยืนยันการลงทะเบียน`;
            }
        });
    </script>
</body>
</html>
